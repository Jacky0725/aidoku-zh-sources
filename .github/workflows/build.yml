name: Build and Deploy Sources

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@nightly
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Cargo registry
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install aidoku-cli
        run: |
          cargo install --git https://github.com/Aidoku/aidoku-rs aidoku-cli

      - name: Build Sources
        run: |
          chmod +x build.sh
          ./build.sh

      - name: Verify non-deprecated packages
        run: |
          python3 .github/scripts/verify_packages.py

      - name: Validate source index references
        run: |
          python3 .github/scripts/validate_source_index.py

      - name: List Output Files
        run: ls -R public || echo "Public folder not found"

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          force_orphan: true
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
